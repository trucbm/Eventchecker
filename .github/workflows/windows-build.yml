name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Portable
        shell: cmd
        run: |
          build\windows\build_portable.bat

      - name: Zip Portable
        shell: pwsh
        run: |
          Compress-Archive -Path dist\EventInspector\* -DestinationPath dist\EventInspector-portable.zip -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build Installer
        shell: cmd
        run: |
          build\windows\build_windows.bat

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EventInspector-Windows
          path: |
            dist/EventInspector-portable.zip
            build/windows/Output/*.exe
